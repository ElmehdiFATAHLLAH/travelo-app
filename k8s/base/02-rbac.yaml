apiVersion: v1
kind: ServiceAccount
metadata:
  name: travelo-deployer
  namespace: travelo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: travelo-namespace-operator
  namespace: travelo
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: travelo-deployer-readonly
  namespace: travelo
subjects:
  - kind: ServiceAccount
    name: travelo-deployer
    namespace: travelo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: travelo-namespace-operator

