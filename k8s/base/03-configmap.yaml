apiVersion: v1
kind: ConfigMap
metadata:
  name: travelo-config
  namespace: travelo
data:
  MYSQL_DATABASE: travelo_db
  MYSQL_USER: travelo
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travelo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  SPRING_DATASOURCE_USERNAME: travelo
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "true"

