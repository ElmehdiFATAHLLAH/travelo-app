apiVersion: v1
kind: ConfigMap
metadata:
  name: travelo-config
  namespace: {{ .Values.namespace }}
data:
  MYSQL_DATABASE: {{ .Values.mysql.database | quote }}
  MYSQL_USER: {{ .Values.mysql.user | quote }}
  SPRING_DATASOURCE_URL: {{ printf "jdbc:mysql://mysql:3306/%s?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" .Values.mysql.database | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.mysql.user | quote }}
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: travelo-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.mysql.rootPassword | quote }}
  MYSQL_PASSWORD: {{ .Values.mysql.password | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.mysql.password | quote }}

