apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: travelo-backend
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - travelo
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s

