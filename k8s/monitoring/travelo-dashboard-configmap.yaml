apiVersion: v1
kind: ConfigMap
metadata:
  name: travelo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  travelo-dashboard.json: |
    {
      "title": "Travelo Application Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "timeseries",
          "title": "CPU usage by Travelo pod",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"travelo\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Memory usage by Travelo pod",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"travelo\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Travelo pod restarts",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"travelo\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}
        },
        {
          "type": "logs",
          "title": "Travelo pod logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "expr": "{namespace=\"travelo\"}",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 16}
        }
      ]
    }
