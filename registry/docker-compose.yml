version: "3.9"

services:

  registry:
    image: registry:2
    container_name: docker_registry
    restart: always
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: '["http://localhost:8081"]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '[GET, HEAD, OPTIONS]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '[Authorization, Accept]'
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - registry-net

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: registry_ui
    restart: always
    ports:
      - "8081:80"
    environment:
      REGISTRY_URL: http://localhost:5000
      SINGLE_REGISTRY: "true"
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
    depends_on:
      - registry
    networks:
      - registry-net

volumes:
  registry_data:

networks:
  registry-net:
    driver: bridge