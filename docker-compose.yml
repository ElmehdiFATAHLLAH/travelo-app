version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: travelo_app
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: travelo_db
      MYSQL_USER: travelo
      MYSQL_PASSWORD: travelo123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travelo-network

  backend:
    image: elmehdift37/travelo-backend:1.0
    container_name: travelo-backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travelo_db
      SPRING_DATASOURCE_USERNAME: travelo
      SPRING_DATASOURCE_PASSWORD: travelo123
    networks:
      - travelo-network

  frontend:
    image: elmehdift37/travelo-frontend:1.0
    container_name: travelo-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - travelo-network

volumes:
  mysql_data:

networks:
  travelo-network:
    driver: bridge