version: "3.9"

services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: travelo_db
      MYSQL_USER: travelo
      MYSQL_PASSWORD: travelo123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travelo-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  backend:
    image: travel-backend-image:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/travelo_db
      SPRING_DATASOURCE_USERNAME: travelo
      SPRING_DATASOURCE_PASSWORD: travelo123
    networks:
      - travelo-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    image: elmehdift37/travelo-frontend:1.0
    ports:
      - "3000:80"
    networks:
      - travelo-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - travelo-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  mysql_data:

networks:
  travelo-network:
    driver: overlay